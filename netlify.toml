[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Proxy /api/* → serverless function (API key never leaves the server)
# Matches both direct access (/api/*) and when proxied via root domain (/global-insigth/api/*)
[[redirects]]
  from   = "/global-insigth/api/*"
  to     = "/.netlify/functions/csc-proxy"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/csc-proxy"
  status = 200
  force  = true

# SPA fallback — must come last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
